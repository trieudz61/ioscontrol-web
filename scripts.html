<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Library — IOSControl</title>
    <meta name="description" content="Ready-to-use Lua script examples for IOSControl iPhone automation. Find image, loop, check IP, color detection, OCR and more." />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
/* ═══ Theme ═══ */
:root, [data-theme="dark"] {
    --bg: #050508;
    --bg-card: #0c0e14;
    --bg-card-hover: #11131c;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(99,102,241,0.3);
    --text: #e8eaf0;
    --text-dim: #7a7e94;
    --text-muted: #4a4e62;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --accent-glow: rgba(99,102,241,0.15);
    --green: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --red: #f87171;
    --code-bg: #0a0c12;
    --nav-bg: rgba(5,5,8,0.85);
}
[data-theme="light"] {
    --bg: #f8f9fc;
    --bg-card: #ffffff;
    --bg-card-hover: #f0f1f5;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(99,102,241,0.35);
    --text: #1a1d2e;
    --text-dim: #5a5e72;
    --text-muted: #8a8e9e;
    --accent: #6366f1;
    --accent-light: #4f46e5;
    --accent-glow: rgba(99,102,241,0.08);
    --green: #059669;
    --orange: #ea580c;
    --pink: #db2777;
    --cyan: #0891b2;
    --red: #dc2626;
    --code-bg: #f1f3f8;
    --nav-bg: rgba(248,249,252,0.9);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { color: var(--accent); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ─── Nav ─── */
nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
}
.nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
}
.nav-logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 17px; color: var(--text);
}
.nav-logo img { width: 28px; height: 28px; }
[data-theme="light"] .logo-dark { display: none; }
[data-theme="light"] .logo-light { display: block; }
[data-theme="dark"] .logo-dark { display: block; }
[data-theme="dark"] .logo-light { display: none; }
.nav-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 6px; background: var(--accent-glow);
    color: var(--accent-light); margin-left: 4px;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-link-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-size: 13px; cursor: pointer;
    transition: all 0.2s; font-family: inherit; font-weight: 500;
}
.nav-link-btn:hover { border-color: var(--accent); color: var(--text); }
.toggle-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--text); }

/* ─── Hero ─── */
.hero-section {
    text-align: center; padding: 60px 0 40px;
    background: linear-gradient(180deg, rgba(99,102,241,0.04) 0%, transparent 100%);
    position: relative;
}
.hero-section h1 {
    font-size: 36px; font-weight: 800; margin-bottom: 12px;
    letter-spacing: -0.02em;
}
.hero-section h1 span {
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
}
.hero-section p { font-size: 15px; color: var(--text-dim); max-width: 560px; margin: 0 auto; }

/* ─── Search ─── */
.search-wrap {
    max-width: 500px; margin: 28px auto 0; position: relative;
}
.search-wrap input {
    width: 100%; padding: 14px 18px 14px 44px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: inherit; outline: none; transition: border 0.2s;
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
}

/* ─── Filter Tags ─── */
.filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin: 24px 0 40px;
}
.filter-tag {
    padding: 6px 16px; border-radius: 100px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.filter-tag:hover { border-color: var(--accent); color: var(--text); }
.filter-tag.active {
    background: var(--accent-glow); border-color: rgba(99,102,241,0.3);
    color: var(--accent-light);
}

/* ─── Script Cards ─── */
.scripts-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 20px; margin-bottom: 60px;
}
.script-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: all 0.3s ease; position: relative;
}
.script-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
}
.script-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; opacity: 0; transition: opacity 0.3s;
}
.script-card:hover::before { opacity: 1; }
.script-card[data-color="indigo"]::before { background: linear-gradient(90deg, transparent, #6366f1, transparent); }
.script-card[data-color="green"]::before { background: linear-gradient(90deg, transparent, #34d399, transparent); }
.script-card[data-color="orange"]::before { background: linear-gradient(90deg, transparent, #fb923c, transparent); }
.script-card[data-color="pink"]::before { background: linear-gradient(90deg, transparent, #f472b6, transparent); }
.script-card[data-color="cyan"]::before { background: linear-gradient(90deg, transparent, #22d3ee, transparent); }
.script-card[data-color="red"]::before { background: linear-gradient(90deg, transparent, #f87171, transparent); }

.card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 0;
}
.card-meta { display: flex; align-items: center; gap: 10px; }
.card-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-cat {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 3px 8px; border-radius: 6px;
}

.card-desc {
    padding: 10px 20px; font-size: 13px;
    color: var(--text-dim); line-height: 1.6;
}

.card-code {
    position: relative; margin: 0 12px 12px;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
}
.card-code pre {
    padding: 16px 18px; overflow-x: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.8; color: var(--text-dim);
    max-height: 280px; overflow-y: auto;
}
.card-code pre::-webkit-scrollbar { width: 4px; height: 4px; }
.card-code pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* Syntax Colors */
.kw { color: #c792ea; }
.fn { color: #82aaff; }
.str { color: #c3e88d; }
.num { color: #f78c6c; }
.cm { color: #546e7a; }
.op { color: #89ddff; }
.var { color: #ffcb6b; }

[data-theme="light"] .kw { color: #7c3aed; }
[data-theme="light"] .fn { color: #2563eb; }
[data-theme="light"] .str { color: #059669; }
[data-theme="light"] .num { color: #ea580c; }
[data-theme="light"] .cm { color: #94a3b8; }
[data-theme="light"] .op { color: #0891b2; }
[data-theme="light"] .var { color: #d97706; }

.copy-btn {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
    display: flex; align-items: center; gap: 4px;
}
.copy-btn:hover { background: var(--accent-glow); color: var(--accent-light); border-color: rgba(99,102,241,0.3); }

/* ─── Footer ─── */
.page-footer {
    text-align: center; padding: 24px 0 40px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
}

/* ─── No Results ─── */
.no-results {
    grid-column: 1 / -1; text-align: center;
    padding: 60px 20px; color: var(--text-muted);
}
.no-results i { margin-bottom: 12px; display: block; }

/* ─── Responsive ─── */
@media (max-width: 768px) {
    .scripts-grid { grid-template-columns: 1fr; }
    .hero-section h1 { font-size: 26px; }
    .hero-section p { font-size: 13px; }
    .nav-right .nav-link-btn { display: none; }
}
@media (max-width: 480px) {
    .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
}
    </style>
</head>
<body>

<nav>
    <div class="container nav-inner">
        <a href="/" class="nav-logo">
            <img src="/assets/logo-dark.png" alt="IOSControl" class="logo-dark" />
            <img src="/assets/logo-light.png" alt="IOSControl" class="logo-light" />
            IOSControl <span class="nav-badge">Scripts</span>
        </a>
        <div class="nav-right">
            <button class="toggle-btn" id="themeToggle" title="Toggle theme">
                <span id="themeIcon"><i data-lucide="moon" style="width:16px;height:16px;"></i></span>
            </button>
            <a href="/docs.html" class="nav-link-btn">Docs</a>
            <a href="/connect.html" class="nav-link-btn" style="background:var(--accent);color:#fff;border-color:var(--accent);">Launch IDE →</a>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <h1><i data-lucide="library" style="width:36px;height:36px;vertical-align:-6px;color:var(--accent-light);margin-right:6px;"></i> <span>Script Library</span></h1>
        <p>Ready-to-use Lua code snippets for IOSControl. Copy, paste, and customize for your automation tasks.</p>
        <div class="search-wrap">
            <span class="search-icon"><i data-lucide="search" style="width:16px;height:16px;"></i></span>
            <input type="text" id="searchInput" placeholder="Search scripts... (find image, loop, OCR...)" autocomplete="off" />
        </div>
    </div>
</section>

<div class="container">
    <div class="filter-bar" id="filterBar">
        <button class="filter-tag active" data-cat="all"><i data-lucide="layers" style="width:14px;height:14px;vertical-align:-2px;"></i> All</button>
        <button class="filter-tag" data-cat="touch"><i data-lucide="hand" style="width:14px;height:14px;vertical-align:-2px;"></i> Touch</button>
        <button class="filter-tag" data-cat="image"><i data-lucide="image" style="width:14px;height:14px;vertical-align:-2px;"></i> Image</button>
        <button class="filter-tag" data-cat="color"><i data-lucide="palette" style="width:14px;height:14px;vertical-align:-2px;"></i> Color</button>
        <button class="filter-tag" data-cat="ocr"><i data-lucide="scan-text" style="width:14px;height:14px;vertical-align:-2px;"></i> OCR</button>
        <button class="filter-tag" data-cat="loop"><i data-lucide="repeat" style="width:14px;height:14px;vertical-align:-2px;"></i> Loop</button>
        <button class="filter-tag" data-cat="network"><i data-lucide="globe" style="width:14px;height:14px;vertical-align:-2px;"></i> Network</button>
        <button class="filter-tag" data-cat="system"><i data-lucide="settings" style="width:14px;height:14px;vertical-align:-2px;"></i> System</button>
        <button class="filter-tag" data-cat="utility"><i data-lucide="wrench" style="width:14px;height:14px;vertical-align:-2px;"></i> Utility</button>
    </div>
    <div class="scripts-grid" id="scriptsGrid"></div>
</div>

<div class="page-footer">
    <div class="container">
        © 2024-2026 IOSControl · <a href="/">Home</a> · <a href="/docs.html">Docs</a> · <a href="https://t.me/IOSControl_Comunity">Community</a>
    </div>
</div>

<script>
// ═══ Script Data ═══
const SCRIPTS = [
  {
    id: 'find-image', title: 'Find Image on Screen', cat: 'image', color: 'indigo',
    icon: 'image', iconBg: 'rgba(99,102,241,0.12)', iconColor: '#818cf8',
    desc: 'Search for a template image on screen. Tap on it when found, or wait and retry.',
    code: `<span class="cm">-- Find image and tap on it</span>
<span class="kw">local</span> <span class="var">x</span>, <span class="var">y</span> <span class="op">=</span> <span class="fn">findImage</span>(<span class="str">"target.png"</span>, <span class="num">1</span>, <span class="num">0.9</span>)
<span class="kw">if</span> <span class="var">x</span> <span class="op">~=</span> <span class="num">-1</span> <span class="kw">then</span>
    <span class="fn">log</span>(<span class="str">"Found at: "</span> <span class="op">..</span> <span class="var">x</span> <span class="op">..</span> <span class="str">", "</span> <span class="op">..</span> <span class="var">y</span>)
    <span class="fn">tap</span>(<span class="var">x</span>, <span class="var">y</span>)
<span class="kw">else</span>
    <span class="fn">log</span>(<span class="str">"Image not found"</span>)
<span class="kw">end</span>

<span class="cm">-- Wait until image appears (max 10s)</span>
<span class="kw">for</span> <span class="var">i</span> <span class="op">=</span> <span class="num">1</span>, <span class="num">20</span> <span class="kw">do</span>
    <span class="kw">local</span> <span class="var">x</span>, <span class="var">y</span> <span class="op">=</span> <span class="fn">findImage</span>(<span class="str">"button.png"</span>)
    <span class="kw">if</span> <span class="var">x</span> <span class="op">~=</span> <span class="num">-1</span> <span class="kw">then</span>
        <span class="fn">tap</span>(<span class="var">x</span>, <span class="var">y</span>)
        <span class="kw">break</span>
    <span class="kw">end</span>
    <span class="fn">sleep</span>(<span class="num">0.5</span>)
<span class="kw">end</span>`
  },
  {
    id: 'smart-loop', title: 'Smart Loop with Retry', cat: 'loop', color: 'green',
    icon: 'repeat', iconBg: 'rgba(52,211,153,0.12)', iconColor: '#34d399',
    desc: 'Loop with retry logic, random delays, and error handling for stable automation.',
    code: `<span class="cm">-- Loop with max retries and random delay</span>
<span class="kw">local</span> <span class="var">MAX_RETRIES</span> <span class="op">=</span> <span class="num">50</span>
<span class="kw">local</span> <span class="var">success</span> <span class="op">=</span> <span class="num">0</span>

<span class="kw">for</span> <span class="var">i</span> <span class="op">=</span> <span class="num">1</span>, <span class="var">MAX_RETRIES</span> <span class="kw">do</span>
    <span class="fn">log</span>(<span class="str">"Round "</span> <span class="op">..</span> <span class="var">i</span> <span class="op">..</span> <span class="str">"/"</span> <span class="op">..</span> <span class="var">MAX_RETRIES</span>)

    <span class="cm">-- Your action here</span>
    <span class="kw">local</span> <span class="var">x</span>, <span class="var">y</span> <span class="op">=</span> <span class="fn">findImage</span>(<span class="str">"claim.png"</span>)
    <span class="kw">if</span> <span class="var">x</span> <span class="op">~=</span> <span class="num">-1</span> <span class="kw">then</span>
        <span class="fn">tap</span>(<span class="var">x</span>, <span class="var">y</span>)
        <span class="var">success</span> <span class="op">=</span> <span class="var">success</span> <span class="op">+</span> <span class="num">1</span>
    <span class="kw">end</span>

    <span class="cm">-- Random delay 1-3 seconds</span>
    <span class="fn">sleep</span>(<span class="num">1</span> <span class="op">+</span> math.<span class="fn">random</span>() <span class="op">*</span> <span class="num">2</span>)
<span class="kw">end</span>
<span class="fn">log</span>(<span class="str">"Done! Success: "</span> <span class="op">..</span> <span class="var">success</span>)`
  },
  {
    id: 'check-ip', title: 'Check Public IP Address', cat: 'network', color: 'cyan',
    icon: 'globe', iconBg: 'rgba(34,211,238,0.12)', iconColor: '#22d3ee',
    desc: 'Get your public IP address via HTTP request. Useful for VPN/proxy verification.',
    code: `<span class="cm">-- Check public IP address</span>
<span class="kw">local</span> <span class="var">result</span> <span class="op">=</span> <span class="fn">execute</span>(<span class="str">"curl -s https://api.ipify.org"</span>)
<span class="fn">log</span>(<span class="str">"Public IP: "</span> <span class="op">..</span> <span class="var">result</span>)
<span class="fn">toast</span>(<span class="str">"IP: "</span> <span class="op">..</span> <span class="var">result</span>)

<span class="cm">-- Get detailed IP info (JSON)</span>
<span class="kw">local</span> <span class="var">info</span> <span class="op">=</span> <span class="fn">execute</span>(<span class="str">"curl -s https://ipinfo.io"</span>)
<span class="fn">log</span>(<span class="var">info</span>)

<span class="cm">-- Wait for VPN to connect then continue</span>
<span class="kw">for</span> <span class="var">i</span> <span class="op">=</span> <span class="num">1</span>, <span class="num">30</span> <span class="kw">do</span>
    <span class="kw">local</span> <span class="var">ip</span> <span class="op">=</span> <span class="fn">execute</span>(<span class="str">"curl -s --max-time 3 https://api.ipify.org"</span>)
    <span class="kw">if</span> <span class="var">ip</span> <span class="op">~=</span> <span class="str">""</span> <span class="kw">and</span> <span class="op">not</span> <span class="var">ip</span>:<span class="fn">match</span>(<span class="str">"YOUR_REAL_IP"</span>) <span class="kw">then</span>
        <span class="fn">log</span>(<span class="str">"VPN connected! IP: "</span> <span class="op">..</span> <span class="var">ip</span>)
        <span class="kw">break</span>
    <span class="kw">end</span>
    <span class="fn">sleep</span>(<span class="num">1</span>)
<span class="kw">end</span>`
  },
  {
    id: 'color-detect', title: 'Color Detection & Wait', cat: 'color', color: 'pink',
    icon: 'palette', iconBg: 'rgba(244,114,182,0.12)', iconColor: '#f472b6',
    desc: 'Detect pixel colors, wait for a specific color to appear, and find color patterns.',
    code: `<span class="cm">-- Get color at point</span>
<span class="kw">local</span> <span class="var">c</span> <span class="op">=</span> <span class="fn">getColor</span>(<span class="num">200</span>, <span class="num">400</span>)
<span class="fn">log</span>(string.<span class="fn">format</span>(<span class="str">"Color: 0x%06X"</span>, <span class="var">c</span>))

<span class="cm">-- Wait for specific color (e.g. green button)</span>
<span class="kw">for</span> <span class="var">i</span> <span class="op">=</span> <span class="num">1</span>, <span class="num">60</span> <span class="kw">do</span>
    <span class="kw">if</span> <span class="fn">getColor</span>(<span class="num">215</span>, <span class="num">580</span>) <span class="op">==</span> <span class="num">0x34D399</span> <span class="kw">then</span>
        <span class="fn">log</span>(<span class="str">"Button ready!"</span>)
        <span class="fn">tap</span>(<span class="num">215</span>, <span class="num">580</span>)
        <span class="kw">break</span>
    <span class="kw">end</span>
    <span class="fn">sleep</span>(<span class="num">0.5</span>)
<span class="kw">end</span>

<span class="cm">-- Find color on screen region</span>
<span class="kw">local</span> <span class="var">results</span> <span class="op">=</span> <span class="fn">findColor</span>(<span class="num">0xFF0000</span>, <span class="num">5</span>,
    {<span class="num">0</span>, <span class="num">0</span>, <span class="num">430</span>, <span class="num">932</span>})
<span class="kw">for</span> <span class="var">_</span>, <span class="var">r</span> <span class="kw">in</span> <span class="fn">ipairs</span>(<span class="var">results</span>) <span class="kw">do</span>

// ═══ Render ═══
const grid = document.getElementById('scriptsGrid');
let activeFilter = 'all';
let searchQuery = '';

function render() {
    let filtered = SCRIPTS.filter(s => {
        const matchCat = activeFilter === 'all' || s.cat === activeFilter;
        const matchQ = !searchQuery ||
            s.title.toLowerCase().includes(searchQuery) ||
            s.desc.toLowerCase().includes(searchQuery) ||
            s.cat.toLowerCase().includes(searchQuery);
        return matchCat && matchQ;
    });
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-results"><i data-lucide="search-x" style="width:40px;height:40px;margin:0 auto;"></i><p style="margin-top:12px;font-size:15px;">No scripts found</p><p style="font-size:13px;margin-top:4px;">Try a different search or category</p></div>';
        lucide.createIcons();
        return;
    }
    grid.innerHTML = filtered.map(s => `
        <div class="script-card" data-color="${s.color}" data-cat="${s.cat}">
            <div class="card-header">
                <div class="card-meta">
                    <div class="card-icon" style="background:${s.iconBg};color:${s.iconColor};"><i data-lucide="${s.icon}" style="width:20px;height:20px;"></i></div>
                    <span class="card-title">${s.title}</span>
                </div>
                <span class="card-cat" style="background:${s.iconBg};color:${s.iconColor};">${s.cat}</span>
            </div>
            <div class="card-desc">${s.desc}</div>
            <div class="card-code" id="code-${s.id}">
                <button class="copy-btn" onclick="copyCode('${s.id}')"><i data-lucide="copy" style="width:12px;height:12px;"></i> Copy</button>
                <pre>${s.code}</pre>
            </div>
        </div>
    `).join('');
    lucide.createIcons();
}

// ═══ Filter ═══
document.querySelectorAll('.filter-tag').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        render();
    });
});

// ═══ Search ═══
document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase().trim();
    render();
});

// ═══ Copy ═══
function copyCode(id) {
    const pre = document.querySelector(`#code-${id} pre`);
    if (!pre) return;
    const text = pre.innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(`#code-${id} .copy-btn`);
        btn.innerHTML = '<i data-lucide="check" style="width:12px;height:12px;color:#34d399;"></i> Copied!';
        lucide.createIcons();
        setTimeout(() => {
            btn.innerHTML = '<i data-lucide="copy" style="width:12px;height:12px;"></i> Copy';
            lucide.createIcons();
        }, 2000);
    });
}

// ═══ Theme ═══
let currentTheme = localStorage.getItem('icontrol-theme') || 'dark';
function applyTheme() {
    document.documentElement.setAttribute('data-theme', currentTheme);
    document.getElementById('themeIcon').innerHTML = `<i data-lucide="${currentTheme === 'dark' ? 'moon' : 'sun'}" style="width:16px;height:16px;"></i>`;
    localStorage.setItem('icontrol-theme', currentTheme);
    lucide.createIcons();
}
document.getElementById('themeToggle').addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme();
});
applyTheme();

// Init
render();
</script>
